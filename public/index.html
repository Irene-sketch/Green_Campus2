<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sustainability Tracker | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { height: 100vh; background: linear-gradient(135deg, #0f5132, #198754); display: flex; justify-content: center; align-items: center; }
        .main-container { text-align: center; }
        .title { font-size: 36px; font-weight: 700; color: #ffffff; margin-bottom: 25px; letter-spacing: 1px; }
        .login-container { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 15px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); width: 350px; color: white; }
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { font-size: 14px; margin-bottom: 6px; display: block; }
        .input-group input { width: 100%; padding: 11px; border-radius: 8px; border: none; outline: none; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #20c997; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; color: #000; margin-top: 10px; }
        button:hover { background-color: #17a589; }
    </style>
</head>
<body>
    <div class="main-container">
        <h1 class="title">Sustainability Tracker</h1>
        <div class="login-container">
            <h2>Login</h2>
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="loginUser" placeholder="Enter username" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPass" placeholder="Enter password" required>
                </div>
                <button type="submit">Login</button>
                <p style="margin-top: 15px; text-align: center; color: rgba(255,255,255,0.7); font-size: 14px;">
                    Don't have an account? <a href="register.html" style="color: #20c997;">Register here</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('loginUser').value;
            const password = document.getElementById('loginPass').value;

            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (data.success) {
                localStorage.setItem('user', username);
                window.location.href = 'dashboard.html';
            } else {
                alert(data.message || "Invalid login credentials");
            }
        }
    </script>
</body>
</html>
