<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Campus - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { min-height: 100vh; background: radial-gradient(circle at 75% 45%, #128564 0%, #031f1a 100%); color: #fff; display: flex; align-items: center; justify-content: center; }
        .register-card { background: rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; backdrop-filter: blur(10px); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; }
        .btn { background: #10b981; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: 20px; }
        a { color: #10b981; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="register-card">
        <h2>Create Account</h2>
        <p style="opacity: 0.7; margin-bottom: 20px;">Join the sustainability mission</p>
        <input type="text" id="regUser" placeholder="Username" autocomplete="username" required>
        <input type="email" id="regEmail" placeholder="Email" autocomplete="email" required>
        <input type="password" id="regPass" placeholder="Password" autocomplete="new-password" required>
        <div id="regError" style="display:none; margin-top: 10px; color:#fecaca; font-size: 14px;"></div>
        <button class="btn" id="regBtn" onclick="register()">Create Account</button>
        <p style="margin-top: 20px; text-align: center;">
            Already have an account? <a href="index.html">Login</a>
        </p>
    </div>

    <script>
        async function register() {
            const errEl = document.getElementById('regError');
            const btn = document.getElementById('regBtn');
            errEl.style.display = 'none';
            errEl.textContent = '';

            const user = document.getElementById('regUser').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;

            if (!user || !email || !pass) {
                errEl.textContent = "Please fill all fields.";
                errEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            const oldLabel = btn.textContent;
            btn.textContent = 'Creating...';
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, email: email, password: pass })
                });

                let payload = null;
                try { payload = await response.json(); } catch { payload = null; }

                if (response.ok && payload && payload.success) {
                    window.location.href = 'index.html';
                    return;
                }

                errEl.textContent = (payload && payload.message) ? payload.message : `Registration failed (${response.status}).`;
                errEl.style.display = 'block';
            } catch (e) {
                errEl.textContent = "Network/server error. Please try again.";
                errEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = oldLabel;
            }
        }
    </script>
</body>
</html>
