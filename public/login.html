
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sustainability Tracker | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    @keyframes floatBranches {
      0%   { transform: translateY(0px) translateX(0px) scale(1); }
      50%  { transform: translateY(-20px) translateX(10px) scale(1.02); }
      100% { transform: translateY(15px) translateX(-10px) scale(1); }
    }
    @keyframes branchDrift {
      0%   { transform: translateY(0px) rotate(0deg); opacity: 0.55; }
      50%  { transform: translateY(-14px) rotate(0.6deg); opacity: 0.72; }
      100% { transform: translateY(6px) rotate(-0.4deg); opacity: 0.55; }
    }
    @keyframes branchDriftR {
      0%   { transform: translateY(0px) rotate(0deg) scaleX(-1); opacity: 0.45; }
      50%  { transform: translateY(-10px) rotate(-0.5deg) scaleX(-1); opacity: 0.62; }
      100% { transform: translateY(8px) rotate(0.3deg) scaleX(-1); opacity: 0.45; }
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.18; }
      50%       { opacity: 0.32; }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes subtlePulse {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1; }
    }
    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    :root {
      --bg-deep:       #0a2e1e;
      --bg-mid:        #0f3d2e;
      --bg-light:      #145a3a;
      --glass-bg:      rgba(255,255,255,0.055);
      --glass-bg2:     rgba(255,255,255,0.095);
      --glass-border:  rgba(255,255,255,0.10);
      --glass-border2: rgba(255,255,255,0.16);
      --accent-green:  #4ade80;
      --accent-sage:   #86efac;
      --text-primary:  #f0f4f0;
      --text-secondary:rgba(240,244,240,0.55);
      --text-muted:    rgba(240,244,240,0.30);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      color: var(--text-primary);
      background-color: var(--bg-deep);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* ── LAYERED BACKGROUND ───────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 10%, #1a5c3a 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 80%, #0f3d2e 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 70% 20%, #183d28 0%, transparent 50%),
        linear-gradient(145deg, #0f3d2e 0%, #0a2e1e 45%, #061a0f 100%);
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='1200' height='1200' viewBox='0 0 1200 1200' xmlns='http://www.w3.org/2000/svg'%3E%3Cg stroke='%23ffffff' stroke-opacity='0.05' stroke-width='1.2' fill='none'%3E%3Cpath d='M150 1000 C300 700, 500 800, 650 500'/%3E%3Cpath d='M650 500 C800 200, 1000 300, 1100 100'/%3E%3Cpath d='M300 800 C350 750, 420 780, 480 720'/%3E%3Cpath d='M750 400 C800 350, 900 380, 950 320'/%3E%3Cpath d='M500 900 C540 860, 600 880, 640 820'/%3E%3Cpath d='M900 250 C940 210, 1000 240, 1040 180'/%3E%3C/g%3E%3C/svg%3E");
      background-size: 1200px 1200px;
      opacity: 0.9;
      animation: floatBranches 40s ease-in-out infinite alternate;
      mix-blend-mode: overlay;
      z-index: 0;
      pointer-events: none;
    }

    .noise-layer {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 200px 200px;
      opacity: 0.028;
      mix-blend-mode: overlay;
    }

    .wave-shape { position: fixed; pointer-events: none; z-index: 0; }
    .wave-shape-1 {
      bottom: -120px; left: -80px;
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(34,197,94,0.06) 0%, transparent 70%);
      border-radius: 50% 50% 40% 60% / 60% 40% 60% 40%;
      transform: rotate(-15deg);
    }
    .wave-shape-2 {
      top: -100px; right: -120px;
      width: 500px; height: 500px;
      background: radial-gradient(ellipse, rgba(20,90,58,0.12) 0%, transparent 65%);
      border-radius: 40% 60% 60% 40% / 40% 40% 60% 60%;
      transform: rotate(25deg);
    }
    .wave-shape-3 {
      top: 40%; left: 30%;
      width: 700px; height: 300px;
      background: radial-gradient(ellipse, rgba(26,92,58,0.045) 0%, transparent 70%);
      border-radius: 50%;
      transform: rotate(-8deg);
    }

    .branch-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='1200' height='1200' viewBox='0 0 1200 1200' xmlns='http://www.w3.org/2000/svg'%3E%3Cg stroke='%23ffffff' stroke-opacity='0.12' stroke-width='1.5' fill='none'%3E%3Cpath d='M150 1000 C300 700, 500 800, 650 500'/%3E%3Cpath d='M650 500 C800 200, 1000 300, 1100 100'/%3E%3C/g%3E%3C/svg%3E");
      animation: floatBranches 40s ease-in-out infinite alternate;
      mix-blend-mode: soft-light;
    }

    /* ── MAIN LAYOUT ──────────────────────────────────── */
    .page {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 2rem;
    }

    /* ── HEADER ───────────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 2.2rem;
      animation: fadeSlideUp 0.55s ease both;
    }
    .header-eyebrow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 0.7rem;
    }
    .header-dot {
      width: 6px; height: 6px;
      background: var(--accent-green);
      border-radius: 50%;
      animation: subtlePulse 2.4s ease-in-out infinite;
      box-shadow: 0 0 8px rgba(74,222,128,0.5);
    }
    .header-eyebrow span {
      font-size: 0.68rem;
      color: var(--accent-green);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.4rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      line-height: 1.1;
      margin-bottom: 0.35rem;
    }
    .header p {
      font-size: 0.72rem;
      color: var(--text-secondary);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ── LOGIN CARD ───────────────────────────────────── */
    .login-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 1.6rem;
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      box-shadow:
        0 4px 24px rgba(0,0,0,0.22),
        0 1px 0 rgba(255,255,255,0.07) inset,
        0 -1px 0 rgba(0,0,0,0.1) inset;
      padding: 2.6rem 2.4rem 2.4rem;
      width: 100%;
      max-width: 400px;
      position: relative;
      overflow: hidden;
      animation: fadeSlideUp 0.55s 0.1s ease both;
    }

    /* Top green accent line */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #4ade80, #22c55e, transparent);
      border-radius: 0 0 2px 2px;
      opacity: 0.7;
    }

    /* Ambient inner glow */
    .login-card::after {
      content: '';
      position: absolute;
      top: -40px; left: 50%;
      transform: translateX(-50%);
      width: 200px; height: 80px;
      background: radial-gradient(ellipse, rgba(74,222,128,0.08), transparent 70%);
      pointer-events: none;
    }

    .card-title {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 1.8rem;
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }
    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent);
    }

    /* ── FIELDS ───────────────────────────────────────── */
    .field {
      margin-bottom: 1.2rem;
    }
    .field label {
      display: block;
      font-size: 0.67rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }
    .field-wrap {
      position: relative;
    }
    .field-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem;
      opacity: 0.45;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .field input {
      width: 100%;
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 0.7rem;
      color: var(--text-primary);
      padding: 0.85rem 1rem 0.85rem 2.6rem;
      font-size: 0.92rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: rgba(74,222,128,0.45);
      background: rgba(0,0,0,0.28);
      box-shadow: 0 0 0 3px rgba(74,222,128,0.08);
    }
    .field input:focus + .field-icon,
    .field-wrap:focus-within .field-icon {
      opacity: 0.7;
    }
    .field input::placeholder { color: var(--text-muted); }

    /* ── FORGOT LINK ──────────────────────────────────── */
    .forgot-row {
      text-align: right;
      margin-top: -0.6rem;
      margin-bottom: 1.6rem;
    }
    .forgot-link {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.2s;
      cursor: pointer;
    }
    .forgot-link:hover { color: var(--accent-sage); }

    /* ── LOGIN BUTTON ─────────────────────────────────── */
    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      border: none;
      border-radius: 0.7rem;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 1rem 2.2rem;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 16px rgba(34,197,94,0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      position: relative;
      overflow: hidden;
    }
    .login-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .login-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(34,197,94,0.34);
    }
    .login-btn:hover::before { opacity: 1; }
    .login-btn:active { transform: translateY(0); }

    /* ── DIVIDER ──────────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.6rem 0;
    }
    .divider span {
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      white-space: nowrap;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
    }

    /* ── FOOTER NOTE ──────────────────────────────────── */
    .footer-note {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 1.8rem;
      letter-spacing: 0.04em;
      animation: fadeSlideUp 0.55s 0.22s ease both;
    }
    .footer-note a {
      color: var(--accent-sage);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    .footer-note a:hover { color: var(--accent-green); }

    /* ── BOTTOM BADGES ────────────────────────────────── */
    .badge-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      margin-top: 2.2rem;
      animation: fadeSlideUp 0.55s 0.3s ease both;
    }
    .badge {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .badge-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(74,222,128,0.4);
    }

    /* ── BOTANICAL BRANCHES ───────────────────────────── */
    .botanical-branch {
      position: fixed;
      pointer-events: none;
      z-index: 1;
    }
    .botanical-branch svg {
      display: block;
      filter: drop-shadow(0 0 18px rgba(255,255,255,0.18)) drop-shadow(0 0 6px rgba(200,255,220,0.12));
    }
    .branch-left {
      bottom: -30px;
      left: -40px;
      width: 480px;
      animation: branchDrift 12s ease-in-out infinite;
    }
    .branch-right {
      top: -20px;
      right: -50px;
      width: 420px;
      animation: branchDriftR 15s ease-in-out infinite;
    }
    /* soft ambient glow behind each branch */
    .branch-left::after,
    .branch-right::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(255,255,255,0.06), transparent 70%);
      animation: glowPulse 6s ease-in-out infinite;
      pointer-events: none;
    }

    /* ── RESPONSIVE ───────────────────────────────────── */
    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.6rem; }
      .header h1  { font-size: 1.9rem; }
      .branch-left  { width: 280px; left: -60px; }
      .branch-right { width: 260px; right: -60px; }
    }
  </style>
</head>
<body>

  <!-- Background layers -->
  <div class="branch-layer"></div>
  <div class="noise-layer"></div>
  <div class="wave-shape wave-shape-1"></div>
  <div class="wave-shape wave-shape-2"></div>
  <div class="wave-shape wave-shape-3"></div>

  <!-- Botanical branch illustrations -->
  <div class="botanical-branch branch-left">
    <svg viewBox="0 0 480 420" xmlns="http://www.w3.org/2000/svg" fill="none">
      <!-- Main stem -->
      <path d="M30 420 C80 340, 120 280, 160 210 C200 140, 230 100, 260 60" stroke="rgba(255,255,255,0.55)" stroke-width="1.8" stroke-linecap="round"/>
      <!-- Secondary left stem -->
      <path d="M160 210 C130 185, 90 170, 50 160" stroke="rgba(255,255,255,0.38)" stroke-width="1.3" stroke-linecap="round"/>
      <!-- Secondary right stem -->
      <path d="M200 155 C230 130, 260 125, 300 115" stroke="rgba(255,255,255,0.38)" stroke-width="1.3" stroke-linecap="round"/>
      <!-- Tertiary branch -->
      <path d="M230 100 C210 75, 200 50, 210 20" stroke="rgba(255,255,255,0.28)" stroke-width="1" stroke-linecap="round"/>
      <!-- Leaves on main stem -->
      <ellipse cx="170" cy="200" rx="22" ry="10" transform="rotate(-35 170 200)" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.30)" stroke-width="0.9"/>
      <ellipse cx="215" cy="145" rx="20" ry="9"  transform="rotate(-55 215 145)" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.28)" stroke-width="0.9"/>
      <ellipse cx="248" cy="88"  rx="18" ry="8"  transform="rotate(-70 248 88)"  fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.26)" stroke-width="0.9"/>
      <!-- Leaves on left branch -->
      <ellipse cx="100" cy="172" rx="18" ry="8"  transform="rotate(15 100 172)"  fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.22)" stroke-width="0.8"/>
      <ellipse cx="58"  cy="163" rx="15" ry="7"  transform="rotate(8 58 163)"    fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.20)" stroke-width="0.8"/>
      <!-- Leaves on right branch -->
      <ellipse cx="260" cy="128" rx="19" ry="8"  transform="rotate(-20 260 128)" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.22)" stroke-width="0.8"/>
      <ellipse cx="298" cy="118" rx="16" ry="7"  transform="rotate(-12 298 118)" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.20)" stroke-width="0.8"/>
      <!-- Small tip leaves -->
      <ellipse cx="210" cy="22"  rx="12" ry="5"  transform="rotate(-80 210 22)"  fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.22)" stroke-width="0.8"/>
      <ellipse cx="262" cy="55"  rx="13" ry="5"  transform="rotate(-65 262 55)"  fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.20)" stroke-width="0.8"/>
      <!-- Tiny berries / buds -->
      <circle cx="262" cy="58"  r="3" fill="rgba(255,255,255,0.22)"/>
      <circle cx="303" cy="113" r="2.5" fill="rgba(255,255,255,0.18)"/>
      <circle cx="213" cy="19"  r="2.5" fill="rgba(255,255,255,0.18)"/>
      <!-- Leaf veins -->
      <path d="M155 203 C163 200, 175 199, 183 197" stroke="rgba(255,255,255,0.14)" stroke-width="0.6"/>
      <path d="M200 148 C208 145, 220 144, 228 142" stroke="rgba(255,255,255,0.12)" stroke-width="0.6"/>
    </svg>
  </div>

  <div class="botanical-branch branch-right">
    <svg viewBox="0 0 420 380" xmlns="http://www.w3.org/2000/svg" fill="none">
      <!-- Main stem (mirrored via CSS scaleX) -->
      <path d="M30 0 C70 60, 100 120, 140 190 C180 260, 210 300, 250 370" stroke="rgba(255,255,255,0.50)" stroke-width="1.8" stroke-linecap="round"/>
      <!-- Secondary branches -->
      <path d="M140 190 C110 210, 70 215, 30 225" stroke="rgba(255,255,255,0.34)" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M180 250 C215 240, 250 245, 290 240" stroke="rgba(255,255,255,0.30)" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M100 115 C80 95, 75 65, 90 40" stroke="rgba(255,255,255,0.24)" stroke-width="1" stroke-linecap="round"/>
      <!-- Leaves -->
      <ellipse cx="148" cy="182" rx="21" ry="9"  transform="rotate(40 148 182)"  fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.28)" stroke-width="0.9"/>
      <ellipse cx="192" cy="240" rx="20" ry="9"  transform="rotate(55 192 240)"  fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.26)" stroke-width="0.9"/>
      <ellipse cx="232" cy="305" rx="18" ry="8"  transform="rotate(65 232 305)"  fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.24)" stroke-width="0.9"/>
      <ellipse cx="70"  cy="220" rx="17" ry="7"  transform="rotate(-10 70 220)"  fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.20)" stroke-width="0.8"/>
      <ellipse cx="32"  cy="228" rx="14" ry="6"  transform="rotate(-5 32 228)"   fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
      <ellipse cx="255" cy="243" rx="17" ry="7"  transform="rotate(15 255 243)"  fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.20)" stroke-width="0.8"/>
      <ellipse cx="290" cy="238" rx="14" ry="6"  transform="rotate(10 290 238)"  fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
      <ellipse cx="88"  cy="42"  rx="12" ry="5"  transform="rotate(75 88 42)"    fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.20)" stroke-width="0.8"/>
      <!-- Buds -->
      <circle cx="293" cy="238" r="3"   fill="rgba(255,255,255,0.20)"/>
      <circle cx="235" cy="302" r="2.5" fill="rgba(255,255,255,0.16)"/>
      <circle cx="90"  cy="39"  r="2.5" fill="rgba(255,255,255,0.16)"/>
    </svg>
  </div>

  <div class="page">

    <!-- Header -->
    <div class="header">
      <div class="header-eyebrow">
        <div class="header-dot"></div>
        <span>Tracking your impact</span>
        <div class="header-dot"></div>
      </div>
      <h1>Sustainability Tracker</h1>
      <p>Environmental Monitoring Platform</p>
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <div class="card-title">Sign in to your account</div>

      <div class="field">
        <label>Username / Email</label>
        <div class="field-wrap">
          <input type="text" placeholder="Enter username or email">
          <span class="field-icon">✉</span>
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="field-wrap">
          <input type="password" placeholder="Enter password">
          <span class="field-icon">🔒</span>
        </div>
      </div>

      <div class="forgot-row">
        <a class="forgot-link" href="#">Forgot password?</a>
      </div>

      <button class="login-btn" type="button">
        <span>Sign In</span>
        <span style="font-size:0.85rem; letter-spacing:0;">→</span>
      </button>

      <div class="divider">
        <span>or</span>
      </div>

      <div style="text-align:center; font-size:0.75rem; color:var(--text-muted);">
        Don't have an account?
        <a href="#" style="color:var(--accent-sage); text-decoration:none; font-weight:600; margin-left:0.3rem; transition:color 0.2s;"
           onmouseover="this.style.color='var(--accent-green)'"
           onmouseout="this.style.color='var(--accent-sage)'">
          Request Access
        </a>
      </div>
    </div>

    <!-- Badges -->
    <div class="badge-row">
      <div class="badge"><div class="badge-dot"></div> Secure Login</div>
      <div class="badge"><div class="badge-dot"></div> Data Encrypted</div>
      <div class="badge"><div class="badge-dot"></div> ISO Compliant</div>
    </div>

  </div>

  <script>
    // Parallax branch layer on mouse move
    document.addEventListener("mousemove", (e) => {
      const x = (e.clientX / window.innerWidth  - 0.5) * 20;
      const y = (e.clientY / window.innerHeight - 0.5) * 20;
      document.querySelector('.branch-layer').style.transform = `translate(${x}px, ${y}px)`;
    });
  </script>

</body>
</html>
