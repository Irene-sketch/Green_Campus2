<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sustainability Tracker - Resource Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { min-height: 100vh; background: radial-gradient(circle at 75% 45%, #128564 0%, #031f1a 100%); color: #f1f5f9; padding: 20px; }
        .card { background: rgba(255, 255, 255, 0.08); padding: 30px; border-radius: 20px; margin: 20px auto; max-width: 800px; }
        .form-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .form-group { flex: 1; }
        label { display: block; margin-bottom: 8px; font-size: 14px; opacity: 0.8; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; }
        .btn { background: #10b981; color: white; border: none; padding: 12px 30px; border-radius: 10px; cursor: pointer; font-weight: 600; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .back-btn { display: block; text-align: center; color: #fff; text-decoration: none; margin-top: 20px; opacity: 0.6; }
    </style>
</head>
<body>
    <h1 style="text-align:center">Log Resource Consumption</h1>
    <div class="card">
        <div class="form-row">
            <div class="form-group">
                <label>Resource Type</label>
                <select id="resType"><option value="electricity">Electricity</option><option value="water">Water</option></select>
            </div>
            <div class="form-group">
                <label>Building</label>
                <select id="building"><option>Main Block</option><option>Civil Block</option></select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Value</label><input type="number" id="qty" min="0" step="0.01"></div>
            <div class="form-group"><label>Date</label><input type="date" id="date"></div>
        </div>
        <button class="btn" onclick="submitData()">Submit Data</button>
    </div>
    <div class="card">
        <table>
            <thead><tr><th>DATE</th><th>TYPE</th><th>BUILDING</th><th>VALUE</th></tr></thead>
            <tbody id="logTable"></tbody>
        </table>
    </div>
    <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>

    <script>
        function unitFor(type) {
            return type === 'electricity' ? 'kWh' : 'L';
        }

        function submitData() {
            const type = document.getElementById('resType').value;
            const qty = parseFloat(document.getElementById('qty').value);
            const date = document.getElementById('date').value;
            const building = document.getElementById('building').value;
            if(!Number.isFinite(qty) || qty < 0 || !date) return alert("Please fill all fields with valid values");

            const data = JSON.parse(localStorage.getItem('campusData')) || { electricity: [], water: [], waste: [] };
            data[type].push({ qty, date, building });
            localStorage.setItem('campusData', JSON.stringify(data));
            location.reload();
        }

        window.onload = function() {
            const data = JSON.parse(localStorage.getItem('campusData')) || { electricity: [], water: [], waste: [] };
            const tbody = document.getElementById('logTable');
            const elec = (Array.isArray(data.electricity) ? data.electricity : []).map(e => ({...e, resourceType: 'electricity'}));
            const water = (Array.isArray(data.water) ? data.water : []).map(e => ({...e, resourceType: 'water'}));

            [...elec, ...water]
                .filter(item => item && item.date && Number.isFinite(item.qty) && item.qty >= 0)
                .sort((a, b) => String(b.date).localeCompare(String(a.date)))
                .forEach(item => {
                    const label = item.resourceType === 'electricity' ? 'Electricity' : 'Water';
                    const building = item.building || '-';
                    tbody.innerHTML += `<tr><td>${item.date}</td><td>${label}</td><td>${building}</td><td>${item.qty} ${unitFor(item.resourceType)}</td></tr>`;
                });
        };
    </script>
</body>
</html>
