<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sustainability Tracker | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg-deep:#0f5132;
      --glass-bg:rgba(16,185,129,0.1);
      --glass-border:rgba(255,255,255,0.16);
      --text-primary:#f8fafc;
      --text-muted:rgba(248,250,252,0.7);
      --accent:#22c55e;
      --accent2:#16a34a;
    }
    *{margin:0;padding:0;box-sizing:border-box;font-family:'DM Sans',sans-serif;}
    body{min-height:100vh;background:radial-gradient(circle at 20% 20%, #157a4f 0%, #0f5132 50%, #0a321f 100%);display:flex;align-items:center;justify-content:center;color:var(--text-primary);overflow:hidden;}
    .scene{position:fixed;inset:0;pointer-events:none;z-index:0;}
    .login-card{position:relative;z-index:2;width:min(420px,95vw);background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:18px;backdrop-filter:blur(16px);box-shadow:0 18px 38px rgba(0,0,0,.3);padding:2.2rem;}
    .title{font-family:'DM Serif Display',serif;font-size:2.5rem;text-align:center;margin-bottom:0.3rem;color:#e6f7ec;}
    .subtitle{text-align:center;font-size:0.88rem;color:var(--text-muted);margin-bottom:1.6rem;letter-spacing:.08em;text-transform:uppercase;}
    .field{margin-top:1rem;}
    .field label{display:block;margin-bottom:.45rem;font-size:.75rem;letter-spacing:.11em;text-transform:uppercase;color:var(--text-muted);}
    .field input{width:100%;border:1px solid rgba(255,255,255,0.2);border-radius:12px;padding:0.8rem 1rem;background:rgba(255,255,255,0.9);color:#0f2e1f;font-size:.96rem;outline:none;}
    .field input:focus{border-color:rgba(34,197,94,.75);box-shadow:0 0 0 3px rgba(34,197,94,.14);}
    .btn{width:100%;margin-top:1.4rem;padding:0.95rem 1.05rem;border:0;border-radius:12px;font-size:1rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;cursor:pointer;transition:transform .2s,filter .2s;}
    .btn:hover{transform:translateY(-1px);filter:brightness(1.08);}
    .actions{text-align:center;margin-top:1.1rem;color:var(--text-muted);font-size:0.85rem;}
    .actions a{color:#a8f0cc;text-decoration:none;font-weight:600;}
    .error{margin-top:.9rem;color:#fca5a5;font-size:.85rem;text-align:center;min-height:1.2em;}
    @media (max-width:480px){.login-card{padding:1.6rem;} .title{font-size:2rem;}}
  </style>
</head>
<body>
  <div class="scene"></div>
  <div class="login-card">
    <h1 class="title">Sustainability Tracker</h1>
    <p class="subtitle">Sign in to your account</p>

    <div class="field">
      <label for="username">Username / Email</label>
      <input id="username" type="text" autocomplete="username" placeholder="Enter your username or email" required>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="Enter your password" required>
    </div>

    <button class="btn" id="loginBtn">Sign In →</button>
    <p class="error" id="errorMessage"></p>

    <p class="actions">Don't have an account? <a href="register.html">Register Here</a></p>
  </div>

  <script>
    async function handleLogin(){
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const err = document.getElementById('errorMessage');
      err.textContent = '';

      if (!username || !password){ err.textContent = 'Fill both username and password.'; return; }

      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Signing in...';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({username,password})
        });
        const data = await response.json();

        if (response.ok && data.success){
          localStorage.setItem('user', username);
          localStorage.setItem('loggedIn', 'true');
          window.location.href = 'dashboard.html';
        } else {
          err.textContent = data.message || 'Invalid credentials. Please try again.';
        }
      } catch (e){
        err.textContent = 'Server unreachable. Please try later.';
      } finally {
        btn.disabled = false; btn.textContent = 'Sign In →';
      }
    }

    document.getElementById('loginBtn').addEventListener('click', handleLogin);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });

    window.addEventListener('load', () => {
      if (localStorage.getItem('loggedIn') === 'true') {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
