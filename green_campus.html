<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waste Log</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #022c22; color: #f0fdf4; padding: 40px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; margin-bottom: 20px; }
        input, select, button { padding: 10px; margin: 5px; border-radius: 8px; border: none; }
        table { width: 100%; margin-top: 20px; }
        .back-link { display: block; text-align: center; color: #10b981; text-decoration: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>Log Campus Waste</h2>
            <form id="wasteForm">
                <select id="type"><option value="wet">Wet</option><option value="dry">Dry</option></select>
                <input type="number" id="qty" placeholder="kg" min="0" step="0.01" required>
                <input type="date" id="date" required>
                <button type="submit" style="background:#10b981; color:white">Log Entry</button>
            </form>
        </div>
        <div class="card">
            <table>
                <thead><tr><th>Date</th><th>Type</th><th>Qty</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
    </div>
    <script>
        document.getElementById('wasteForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const qty = parseFloat(document.getElementById('qty').value);
            const type = document.getElementById('type').value;
            const date = document.getElementById('date').value;
            if (!Number.isFinite(qty) || qty < 0 || !date) {
                alert("Please enter a valid quantity and date.");
                return;
            }

            const data = JSON.parse(localStorage.getItem('campusData')) || { electricity: [], water: [], waste: [] };
            data.waste.push({ qty, type, date });
            localStorage.setItem('campusData', JSON.stringify(data));
            location.reload();
        });

        window.onload = function() {
            const data = JSON.parse(localStorage.getItem('campusData')) || { electricity: [], water: [], waste: [] };
            const tbody = document.getElementById('tableBody');
            const safeWaste = Array.isArray(data.waste) ? data.waste : [];
            safeWaste
                .filter(item => item && Number.isFinite(item.qty) && item.qty >= 0 && item.date)
                .forEach(item => {
                    tbody.innerHTML += `<tr><td>${item.date}</td><td>${item.type}</td><td>${item.qty} kg</td></tr>`;
                });
        };
    </script>
</body>
</html>
